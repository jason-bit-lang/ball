{% extends "base.html" %}
{% block content %}
<div class="form-container">
<h2>Inscription</h2>
{% if error %}
<p>{{ error }}</p>
{% endif %}

<form method="POST">
    <label>Nom</label>
    <input type="text" name="nom" placeholder="Votre nom" required>
    <label>Prénom</label>
    <input type="text" name="prenom" placeholder="Votre prénom" required>
    <label>Email</label>
    <input type="text" name="email" placeholder="exemple@gmail.com" required>
    <label>Mot de passe</label>
    <input type="password" name="password" placeholder="Mot secret" required>
    <label>Confirmer le mot de passe</label>
    <input type="password" name="confirmation_mot_secret" placeholder="Confirmez votre mot secret"required>
    <br><br>
    <button type="submit">Inscrivez-vous</button>
</form>
<p>
    Avez-vous déjà un compte ?
    <a class="form-footer" href="/login">Connectez-vous</a>
</p>
</div>
{% endblock %}
