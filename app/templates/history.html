{% extends "base.html" %}
{% block content %}
<div class="history-container">
<h2>Mon historique</h2>

{% for doc in documents %}
<p>
    <strong>{{doc.original_filename}}</strong> - {{ doc.upload_date }} - {{ doc.status }}
    <a href="/result">
        <button type="button">Voir</button>
    </a>
</p>
</div>
{% endfor %}
{% endblock %}
